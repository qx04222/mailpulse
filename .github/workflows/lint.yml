name: Lint

on:
  push:
    branches: [main]
    paths: ['engine/**']
  pull_request:
    branches: [main]
    paths: ['engine/**']

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: |
          cd engine
          ruff check src/
